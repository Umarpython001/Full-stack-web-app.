{% extends "base.html" %}

{% block csStyles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
{% endblock %}

{% block body %}

<div class="container mt-5">
    <div class="row pb-5 border-bottom align-items-center">
        <div class="col-md-4 text-center">
            <div class="profile-pic-wrapper">
                <img src="{{ url_for('static', filename=current_user.profilePic) }}" 
                     alt="Profile Picture" 
                     class="img-fluid rounded-circle img-thumbnail shadow-sm">
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="d-flex align-items-center mb-3 flex-wrap">
                <h2 class="me-4 mb-0 fw-light">{{ current_user.firstName }} {{ current_user.lastName }}</h2>
                <a href="/user/edit_profile" class="btn btn-outline-secondary btn-sm fw-bold">Edit Profile</a>
            </div>

            <div class="d-flex mb-3">
                <div class="me-4"><strong>12</strong> posts</div>
                <div class="me-4"><strong>250</strong> followers</div>
                <div><strong>300</strong> following</div>
            </div>

            <div class="user-bio">
                <p class="mb-0 fw-bold">{{ current_user.firstName }}</p>
                <p class="text-muted">Contact: <a href="mailto:{{ current_user.email }}" class="text-decoration-none text-info">{{ current_user.email }}</a></p>
            </div>
        </div>
    </div>
